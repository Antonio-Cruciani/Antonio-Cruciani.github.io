code:
- title: 'PercIS: Fast Percolation Centrality Approximation with Importance Sampling'
  code_url: https://github.com/Antonio-Cruciani/PERCIS
  description: PercIS is a sampling-based approximation algorithm based on importance sampling to approximate the percolation centrality of all nodes of a graph.
- title: 'FEPiC: Fast Estimation of Percolation Centrality'
  code_url: https://github.com/Antonio-Cruciani/percolation_centrality
  description: FEPiC is a progressive sampling algorithm for approximating doubly normalized percolation centrality, using Monte Carlo Empirical Rademacher Averages and variance-aware bounds. The implementation includes progressive, fixed-sample, and exact variants.
  extra_links:
  - label: arXiv
    url: https://arxiv.org/abs/2408.02389
- title: 'MANTRA: Temporal Betweenness Centrality Approximation through Sampling'
  code_url: https://github.com/Antonio-Cruciani/MANTRA
  description: MANTRA is a progressive sampling algorithm for temporal betweenness centrality in temporal graphs. The library also includes algorithms for temporal edge centrality, temporal diameter, average path length, and connectivity rate.
  extra_links:
  - label: arXiv
    url: https://arxiv.org/abs/2304.08356
- title: 'PROPAGATE: a seed propagation framework to compute Distance-based metrics on Very Large Graphs'
  code_url: https://github.com/BigDataLaboratory/MHSE
  description: PROPAGATE is a sampling-based algorithm to approximate distance-based metrics such as diameter, effective diameter, average distance, reachable pairs, connectivity rate, and geometric centralities.
  extra_links:
  - label: arXiv
    url: https://arxiv.org/abs/2301.06499
- title: 'TSBProxy: Temporal Shortest Betweenness Proxy'
  code_url: https://github.com/Antonio-Cruciani/TSBProxy
  description: TSBProxy is a suite of proxies for temporal shortest betweenness centrality, including Julia implementations of shortest and prefix foremost betweenness, ONBRA, and a novel temporal degree proxy.
- title: 'DREG: Dynamic Random Expander Generator'
  code_url: https://github.com/Antonio-Cruciani/DREG-DynamicRandomExpanderGenerator/tree/master
  description: DREG is a Python implementation of a generator for almost regular dynamic random graphs that are expanders at each time step with high probability.
