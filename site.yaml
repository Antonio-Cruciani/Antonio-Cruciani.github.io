profile:
  name: Antonio Cruciani
  role: Postdoctoral Researcher in Computer Science
  affiliation: Aalto University
  group:
    name: Distributed Algorithms group
    url: https://research.cs.aalto.fi/da/
  bio:
  - I am a postdoctoral researcher in Computer Science at Aalto University, working in Jukka Suomela's Distributed Algorithms group.
  - I earned my PhD in Computer Science from Gran Sasso Science Institute (Italy), supervised by Francesco Pasquale and co-supervised by Pierluigi Crescenzi.
  research_focus:
  - Distributed Computing with emphasis on Dynamic Networks with Churn, Node-Capacitated Clique, and CONGEST.
  - Approximation algorithms with emphasis on randomized algorithms for graph mining problems in static and temporal graphs.
  news:
  - date: March 2026
    text: PC member, SSS 2026.
  - date: February 2026
    text: I will be visiting [[leonardo-pellegrina]] at the University of Padua!
  - date: January 2026
    text: One paper accepted at SIROCCO 2026, see you all in Durham!
  - date: August 2025
    text: One paper accepted at ICDM 2025, see you all in DC!
  - date: August 2025
    text: Three papers accepted at DISC 2025, see you all in Berlin!
